<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hangman Game</title>
  <link rel="stylesheet" href="css/style.css"/>
   <script src="script.js" defer></script>
</head>
<body>
  <div class="game-container">
    <h1>Hangman Game</h1>
    <p id="hint">Hint: Loading...</p>
    <!-- Word display -->
    <div id="wordDisplay" class="word"></div>
    <!-- Hangman drawing -->
    <div id="hangman">
      <pre id="hangmanStage"></pre>
    </div>
    <!-- Input -->
    <div class="input-area">
      <input type="text" id="letterInput" maxlength="1" placeholder="Enter a letter"/>
      <button id="guessBtn">Guess</button>
    </div>
    <!-- Letters used -->
    <div id="usedLetters">Used letters: </div>
    <!-- Result -->
    <h2 id="result"></h2>
    <!-- Play again -->
    <button id="playAgainBtn" class="hidden">Play Again</button>
  </div>
</body>
</html>
