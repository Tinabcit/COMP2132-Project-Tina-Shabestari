<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        Tina Shabestari
        COMP2132 Project
        Study Hangman Game
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hangman</title>
    <!-- Main stylesheet compiled from SASS -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Main JavaScript file -->
    <script src="../js/script.js" defer></script>
</head>
<body>

<main class="page">
    <!-- Page heading -->
    <header class="header">
        <div>
            <h1>💻 Study Hangman</h1>
            <p>Guess the words before your study desk gets too messy.</p>
        </div>
    </header>
    <!-- Main game area -->
    <section class="game-card">
        <!-- Hangman image changes after wrong guesses -->
        <div class="image-side">
            <img
                id="hangmanImage"
                src="../images/hangman0.png"
                alt="Study hangman image"
            >
        </div>
        <div class="game-side">
            <!-- Displays the current category -->
            <div class="category-box">
                <span>Category</span>
                <strong id="category">Loading...</strong>
            </div>
            <!-- Game statistics -->
            <div class="stats">
                <div class="stat danger">
                    <span>Wrong Guesses</span>
                    <strong id="wrongGuesses">0 / 6</strong>
                </div>
                <div class="stat blue">
                    <span>Remaining Attempts</span>
                    <strong id="remainingAttempts">6</strong>
                </div>
            </div>
            <!-- Hint for the selected word -->
            <div class="hint-box">
                <h3>💡 Hint</h3>
                <p id="hint">Loading...</p>
            </div>
            <!-- Hidden word display -->
            <div
                id="wordDisplay"
                class="word-display">
            </div>
            <!-- Letter input and guess button -->
            <div class="guess-row">
                <input type="text" id="letterInput" maxlength="1" placeholder="Enter a letter">
                <button id="guessButton">
                    Guess Letter
                </button>
            </div>
            <!-- Shows previously guessed letters -->
            <p id="usedLetters" class="used-letters"> Used Letters: </p>
            <!-- Win or lose message -->
            <h2 id="message"></h2>

            <!-- Starts a new game -->
            <button id="playAgainButton" class="hidden"> Play Again </button>
        </div>
    </section>
</main>

</html>
