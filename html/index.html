<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="game-container">
    <h1>Hangman Game</h1>
    <div class="hint-container">
        <strong>Hint:</strong>
        <span id="hint">Loading...</span>
    </div>
    <div id="wordDisplay" class="word-display"></div>
    <div class="hangman-container">
        <pre id="hangmanDrawing"></pre>
    </div>
    <div class="guess-section">
        <input
            type="text"
            id="letterInput"
            maxlength="1"
            placeholder="A"
        >
        <button id="guessButton">
            Guess Letter
        </button>
    </div>
    <div id="usedLetters">
        Used Letters:
    </div>
    <div id="attempts">
        Remaining Attempts: 6
    </div>
    <h2 id="message"></h2>
    <button id="playAgainButton" class="hidden">
        Play Again
    </button>
</div>
</body>
</html>
